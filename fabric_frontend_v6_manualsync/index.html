FABRIC_HTML = """
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            background: #f8f8f8;
            font-family: sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .outer {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding-bottom: 8px;
        }

        .tools {
            width: 100%;
            max-width: 980px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding-top: 8px;
        }

        .btn-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .tools button {
            padding: 10px 18px;
            font-size: 15px;
            cursor: pointer;
            background-color: #FF4B4B;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
        }

        .tools button:hover {
            background-color: #ff3636;
        }

        .tip {
            color: #666;
            font-size: 13px;
            text-align: center;
            line-height: 1.5;
            padding: 0 12px;
        }

        .canvas-wrap {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .canvas-shell {
            background: white;
            border: 1px solid #ddd;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
            border-radius: 14px;
            padding: 6px;
            display: inline-block;
            box-sizing: border-box;
            touch-action: none;
        }

        .canvas-container {
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="outer">
        <div class="tools">
            <div class="btn-row">
                <button id="sync-btn" type="button">確認排版並產生下載檔</button>
                <button id="delete-btn" type="button">刪除目前選取貼紙</button>
            </div>
            <div class="tip">
                直接在卡片上拖曳、縮放、旋轉貼紙。<br>
                若要刪除，先點選貼紙，再按上方刪除按鈕。
            </div>
        </div>

        <div class="canvas-wrap">
            <div class="canvas-shell" id="shell">
                <canvas id="editor"></canvas>
            </div>
        </div>
    </div>

    <script>
        function sendMessageToStreamlitClient(type, data) {
            window.parent.postMessage(
                Object.assign({ isStreamlitMessage: true, type: type }, data),
                "*"
            );
        }

        function Streamlit_setComponentValue(value) {
            sendMessageToStreamlitClient("streamlit:setComponentValue", { value: value });
        }

        function Streamlit_setFrameHeight(height) {
            sendMessageToStreamlitClient("streamlit:setFrameHeight", { height: height });
        }

        let canvas = null;
        let listenersBound = false;

        function calcDisplaySize() {
            const vw = Math.min(window.innerWidth || 390, document.documentElement.clientWidth || 390);
            const isMobile = vw <= 768;

            let boxWidth = 260;
            let boxHeight = 390;

            if (!isMobile) {
                boxWidth = 340;
                boxHeight = 510;
            }

            if (boxWidth > vw - 24) {
                const scale = (vw - 24) / boxWidth;
                boxWidth = Math.round(boxWidth * scale);
                boxHeight = Math.round(boxHeight * scale);
            }

            return { displayWidth: boxWidth, displayHeight: boxHeight };
        }

        function applyFixedDisplaySize(size) {
            const shell = document.getElementById("shell");
            shell.style.width = (size.displayWidth + 14) + "px";
            shell.style.height = (size.displayHeight + 14) + "px";

            if (canvas) {
                canvas.setDimensions(
                    { width: size.displayWidth + "px", height: size.displayHeight + "px" },
                    { cssOnly: true }
                );
                canvas.calcOffset();
            }
        }

        function updateFrameHeight(size) {
            Streamlit_setFrameHeight(size.displayHeight + 190);
        }

        function loadFabricImage(url) {
            return new Promise((resolve, reject) => {
                fabric.Image.fromURL(
                    url,
                    function(img) {
                        if (img) {
                            resolve(img);
                        } else {
                            reject(new Error("Image load failed"));
                        }
                    },
                    { crossOrigin: "anonymous" }
                );
            });
        }

        function constrainObject(obj) {
            if (!canvas || !obj) return;

            obj.setCoords();
            const rect = obj.getBoundingRect();
            const canvasW = canvas.width;
            const canvasH = canvas.height;

            let newLeft = obj.left;
            let newTop = obj.top;

            if (rect.width > canvasW) {
                newLeft = canvasW / 2;
            } else {
                if (rect.left < 0) {
                    newLeft -= rect.left;
                } else if (rect.left + rect.width > canvasW) {
                    newLeft -= ((rect.left + rect.width) - canvasW);
                }
            }

            if (rect.height > canvasH) {
                newTop = canvasH / 2;
            } else {
                if (rect.top < 0) {
                    newTop -= rect.top;
                } else if (rect.top + rect.height > canvasH) {
                    newTop -= ((rect.top + rect.height) - canvasH);
                }
            }

            if (newLeft !== obj.left || newTop !== obj.top) {
                obj.set({
                    left: newLeft,
                    top: newTop
                });
                obj.setCoords();
            }
        }

        function getLayoutData() {
            if (!canvas) return [];
            return canvas.getObjects().map((obj, idx) => ({
                id: obj.id,
                x: obj.left,
                y: obj.top,
                scale: obj.scaleX,
                rotation: obj.angle,
                z: idx
            }));
        }

        function syncLayout() {
            Streamlit_setComponentValue(getLayoutData());
        }

        function removeActiveObject() {
            if (!canvas) return;
            const activeObj = canvas.getActiveObject();
            if (!activeObj) return;

            canvas.remove(activeObj);
            canvas.discardActiveObject();
            canvas.requestRenderAll();
        }

        function bindListenersOnce() {
            if (listenersBound || !canvas) return;

            canvas.on("object:moving", (e) => constrainObject(e.target));
            canvas.on("object:scaling", (e) => constrainObject(e.target));

            document.getElementById("sync-btn").onclick = function() {
                syncLayout();
            };

            document.getElementById("delete-btn").onclick = function() {
                removeActiveObject();
            };

            document.addEventListener("keydown", function(e) {
                if (e.key === "Delete" || e.key === "Backspace") {
                    removeActiveObject();
                }
            });

            window.addEventListener("resize", function() {
                const newSize = calcDisplaySize();
                applyFixedDisplaySize(newSize);
                updateFrameHeight(newSize);
                if (canvas) {
                    canvas.requestRenderAll();
                }
            });

            listenersBound = true;
        }

        function ensureCanvas(args) {
            if (!canvas) {
                canvas = new fabric.Canvas("editor", {
                    width: args.canvas_width,
                    height: args.canvas_height,
                    preserveObjectStacking: true,
                    selection: false
                });
                bindListenersOnce();
            } else {
                canvas.setWidth(args.canvas_width);
                canvas.setHeight(args.canvas_height);
            }

            const size = calcDisplaySize();
            applyFixedDisplaySize(size);
            updateFrameHeight(size);
        }

        async function renderCanvas(args) {
            ensureCanvas(args);

            canvas.clear();
            canvas.backgroundColor = "#ffffff";

            if (args.bg_b64) {
                try {
                    const bgImg = await loadFabricImage(args.bg_b64);
                    bgImg.set({
                        scaleX: args.canvas_width / bgImg.width,
                        scaleY: args.canvas_height / bgImg.height,
                        originX: "left",
                        originY: "top",
                        selectable: false,
                        evented: false
                    });
                    canvas.setBackgroundImage(bgImg, canvas.renderAll.bind(canvas));
                } catch (e) {
                    canvas.setBackgroundImage(null, canvas.renderAll.bind(canvas));
                }
            } else {
                canvas.setBackgroundImage(null, canvas.renderAll.bind(canvas));
            }

            const sortedItems = (args.items || []).slice().sort((a, b) => {
                const za = (typeof a.z === "number") ? a.z : 0;
                const zb = (typeof b.z === "number") ? b.z : 0;
                return za - zb;
            });

            const loadedEntries = await Promise.all(
                sortedItems.map(async (item) => {
                    try {
                        const img = await loadFabricImage(item.b64);
                        return { item, img };
                    } catch (e) {
                        return null;
                    }
                })
            );

            loadedEntries.forEach((entry) => {
                if (!entry) return;
                const { item, img } = entry;

                img.set({
                    left: item.x,
                    top: item.y,
                    scaleX: item.scale,
                    scaleY: item.scale,
                    angle: item.rotation,
                    originX: "center",
                    originY: "center",
                    id: item.id,
                    cornerColor: "#FF4B4B",
                    borderColor: "#FF4B4B",
                    transparentCorners: false,
                    cornerStyle: "circle",
                    padding: 12,
                    cornerSize: 24,
                    touchCornerSize: 48
                });

                canvas.add(img);
                constrainObject(img);
            });

            const size = calcDisplaySize();
            applyFixedDisplaySize(size);
            updateFrameHeight(size);
            canvas.requestRenderAll();
        }

        window.addEventListener("message", function(event) {
            if (event.data.type === "streamlit:render") {
                renderCanvas(event.data.args);
            }
        });

        window.onload = function() {
            sendMessageToStreamlitClient("streamlit:componentReady", { apiVersion: 1 });
        };
    </script>
</body>
</html>
"""
