
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; background: transparent; }
        .container { position: relative; width: 100%; max-width: 640px; border-radius: 16px; overflow: hidden; background: #000; }
        #video { width: 100%; display: block; }
        /* 前鏡頭需要鏡像翻轉的 CSS 類別 */
        .mirror { transform: scaleX(-1); }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 120px; color: white; font-weight: 900; text-shadow: 0 4px 15px rgba(0,0,0,0.5); pointer-events: none; }
        .controls { display: flex; gap: 10px; margin-top: 15px; width: 100%; max-width: 640px; padding: 0 10px; box-sizing: border-box; }
        .btn { flex: 1; padding: 14px 10px; font-size: 18px; border-radius: 12px; background: #FF4B4B; color: white; border: none; cursor: pointer; font-weight: bold; text-align: center; }
        .btn-switch { flex: 0.4; background: #555555; font-size: 16px; }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { background: #cccccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <video id="video" autoplay playsinline></video>
        <div id="overlay"></div>
    </div>
    <div class="controls">
        <button class="btn btn-switch" id="switch-btn">🔄 翻轉</button>
        <button class="btn" id="start-btn">📸 開始 3 秒倒數</button>
    </div>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        function sendToStreamlit(data) {
            window.parent.postMessage({isStreamlitMessage: true, type: "streamlit:setComponentValue", value: data}, "*");
        }

        const video = document.getElementById('video');
        const overlay = document.getElementById('overlay');
        const btn = document.getElementById('start-btn');
        const switchBtn = document.getElementById('switch-btn');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let currentFacingMode = "user"; // 預設使用前鏡頭 (user)
        let currentStream = null;

        function stopMediaTracks(stream) {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        }

        function startCamera() {
            stopMediaTracks(currentStream);
            const constraints = {
                video: { facingMode: currentFacingMode }
            };

            navigator.mediaDevices.getUserMedia(constraints)
                .then(stream => {
                    currentStream = stream;
                    video.srcObject = stream;
                    // 🌟 只有前鏡頭才需要鏡像畫面，後鏡頭維持正常
                    if (currentFacingMode === "user") {
                        video.classList.add("mirror");
                    } else {
                        video.classList.remove("mirror");
                    }
                })
                .catch(err => {
                    overlay.innerText = "⚠️ 相機權限錯誤";
                    overlay.style.fontSize = "30px";
                    btn.disabled = true;
                    switchBtn.disabled = true;
                });
        }

        // 初始化相機
        startCamera();

        // 🌟 綁定翻轉按鈕事件
        switchBtn.addEventListener('click', () => {
            currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
            startCamera();
        });

        btn.addEventListener('click', () => {
            btn.disabled = true;
            switchBtn.disabled = true;
            let count = 3;
            overlay.innerText = count;

            const interval = setInterval(() => {
                count--;
                if (count > 0) {
                    overlay.innerText = count;
                } else {
                    clearInterval(interval);
                    overlay.innerText = "📸";
                    setTimeout(() => {
                        overlay.innerText = "";
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        
                        // 🌟 輸出圖片時，只有前鏡頭需要左右翻轉像素
                        if (currentFacingMode === "user") {
                            ctx.translate(canvas.width, 0);
                            ctx.scale(-1, 1);
                        }
                        
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        const dataUrl = canvas.toDataURL('image/png');
                        sendToStreamlit(dataUrl);
                        
                        btn.disabled = false;
                        switchBtn.disabled = false;
                    }, 150);
                }
            }, 1000);
        });

        window.onload = function() {
            window.parent.postMessage({isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1}, "*");
            window.parent.postMessage({isStreamlitMessage: true, type: "streamlit:setFrameHeight", height: 600}, "*");
        };
    </script>
</body>
</html>
